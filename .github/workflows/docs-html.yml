name: Docs HTML

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: python -m pip install --upgrade pip sphinx

      - run: make html

      - run: tar -czf zoitechat-docs-html.tar.gz -C _build/html .

      - uses: actions/upload-artifact@v4
        with:
          name: zoitechat-docs-html
          path: zoitechat-docs-html.tar.gz
